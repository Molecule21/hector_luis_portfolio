<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Resume — Hector Luis A. Tinagsa | Full Stack Developer</title>
  <meta name="description" content="Resume of Hector Luis A. Tinagsa, Full Stack Developer with 5+ years of experience." />
  <meta name="robots" content="noindex" />

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&family=Inter:wght@400;500&display=swap" rel="stylesheet" />

  <style>
    /* ── TOKENS ── */
    :root {
      --bg:        #080b14;
      --bg-2:      #0d1120;
      --bg-3:      #121826;
      --border:    rgba(255,255,255,0.09);
      --border-2:  rgba(255,255,255,0.15);
      --accent:    #00d4ff;
      --accent-2:  #7c3aed;
      --green:     #06ffa5;
      --text:      #e8edf5;
      --text-2:    #8b9bb4;
      --text-3:    #5a6a82;
      --mono:      'JetBrains Mono', monospace;
      --main:      'Space Grotesk', sans-serif;
      --body:      'Inter', sans-serif;
      --radius:    12px;
      --transition: 0.3s cubic-bezier(0.4,0,0.2,1);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { height: 100%; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--body);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      -webkit-font-smoothing: antialiased;
      overflow-x: hidden;
    }

    /* ── ANIMATED BG ── */
    .bg-grid {
      position: fixed; inset: 0; z-index: 0;
      background-image:
        linear-gradient(rgba(0,212,255,0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0,212,255,0.03) 1px, transparent 1px);
      background-size: 60px 60px;
      pointer-events: none;
    }
    .bg-glow {
      position: fixed; z-index: 0; border-radius: 50%;
      filter: blur(120px); pointer-events: none; opacity: 0.35;
      animation: floatGlow 8s ease-in-out infinite alternate;
    }
    .glow-1 {
      width: 500px; height: 500px;
      background: radial-gradient(circle, rgba(0,212,255,0.18), transparent 70%);
      top: -180px; left: -180px;
    }
    .glow-2 {
      width: 400px; height: 400px;
      background: radial-gradient(circle, rgba(124,58,237,0.15), transparent 70%);
      bottom: -120px; right: -120px;
      animation-delay: -4s;
    }
    @keyframes floatGlow {
      from { transform: translate(0,0) scale(1); }
      to   { transform: translate(20px,15px) scale(1.08); }
    }

    /* ── TOPBAR ── */
    .topbar {
      position: sticky; top: 0; z-index: 50;
      background: rgba(8,11,20,0.85);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-bottom: 1px solid var(--border);
      padding: 0 32px;
    }
    .topbar-inner {
      max-width: 1100px; margin: 0 auto;
      height: 64px;
      display: flex; align-items: center; justify-content: space-between;
      gap: 20px;
    }

    /* Back button */
    .back-btn {
      display: inline-flex; align-items: center; gap: 8px;
      font-family: var(--mono);
      font-size: 0.75rem; font-weight: 500;
      color: var(--text-2);
      padding: 8px 16px;
      border-radius: var(--radius);
      border: 1px solid var(--border-2);
      background: rgba(255,255,255,0.04);
      transition: all var(--transition);
      text-decoration: none;
    }
    .back-btn:hover {
      color: var(--accent);
      border-color: var(--accent);
      background: rgba(0,212,255,0.06);
      transform: translateX(-2px);
    }
    .back-btn svg { transition: transform var(--transition); }
    .back-btn:hover svg { transform: translateX(-3px); }

    /* Logo */
    .topbar-logo {
      font-family: var(--mono);
      font-size: 1rem; font-weight: 700;
      text-decoration: none;
    }
    .logo-bracket { color: var(--accent); }
    .logo-name    { color: var(--text); }

    /* Action buttons */
    .topbar-actions { display: flex; align-items: center; gap: 10px; }

    .btn-download {
      display: inline-flex; align-items: center; gap: 8px;
      padding: 9px 20px;
      border-radius: var(--radius);
      background: linear-gradient(135deg, var(--accent), #0099cc);
      color: #080b14;
      font-family: var(--main);
      font-size: 0.82rem; font-weight: 700;
      text-decoration: none;
      transition: all var(--transition);
      box-shadow: 0 4px 16px rgba(0,212,255,0.28);
      white-space: nowrap;
    }
    .btn-download:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 28px rgba(0,212,255,0.4);
    }

    .btn-print {
      display: inline-flex; align-items: center; gap: 8px;
      padding: 9px 16px;
      border-radius: var(--radius);
      border: 1px solid var(--border-2);
      color: var(--text-2);
      font-family: var(--main);
      font-size: 0.82rem; font-weight: 500;
      background: transparent;
      cursor: pointer;
      transition: all var(--transition);
      white-space: nowrap;
    }
    .btn-print:hover {
      color: var(--text);
      border-color: var(--text-2);
      background: rgba(255,255,255,0.04);
    }

    /* ── HERO STRIP ── */
    .resume-hero {
      position: relative; z-index: 1;
      padding: 40px 32px 32px;
      text-align: center;
    }
    .resume-hero-tag {
      display: inline-flex; align-items: center; gap: 8px;
      background: rgba(6,255,165,0.08);
      border: 1px solid rgba(6,255,165,0.2);
      padding: 5px 14px; border-radius: 100px;
      font-family: var(--mono);
      font-size: 0.7rem; font-weight: 500;
      color: var(--green);
      margin-bottom: 16px;
    }
    .tag-dot {
      width: 6px; height: 6px;
      background: var(--green); border-radius: 50%;
      animation: pulse 2s infinite;
    }
    @keyframes pulse {
      0%,100% { opacity:1; transform:scale(1); }
      50%      { opacity:0.4; transform:scale(0.7); }
    }
    .resume-hero h1 {
      font-family: var(--main);
      font-size: clamp(1.4rem, 3vw, 2rem);
      font-weight: 700;
      letter-spacing: -0.02em;
      margin-bottom: 6px;
    }
    .resume-hero h1 span {
      background: linear-gradient(135deg, var(--accent), var(--accent-2));
      -webkit-background-clip: text; background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .resume-hero p {
      font-family: var(--mono);
      font-size: 0.78rem;
      color: var(--text-3);
    }

    /* ── PDF VIEWER CONTAINER ── */
    .viewer-wrap {
      position: relative; z-index: 1;
      flex: 1;
      padding: 0 24px 48px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 16px;
    }

    .pdf-card {
      width: 100%;
      max-width: 960px;
      background: var(--bg-3);
      border: 1px solid var(--border-2);
      border-radius: 16px;
      overflow: hidden;
      box-shadow: 0 24px 64px rgba(0,0,0,0.5), 0 0 60px rgba(0,212,255,0.06);
      transition: box-shadow var(--transition);
      animation: riseIn 0.6s ease both;
    }
    .pdf-card:hover {
      box-shadow: 0 32px 80px rgba(0,0,0,0.6), 0 0 80px rgba(0,212,255,0.1);
    }
    @keyframes riseIn {
      from { opacity:0; transform:translateY(24px); }
      to   { opacity:1; transform:translateY(0); }
    }

    /* PDF toolbar */
    .pdf-toolbar {
      display: flex; align-items: center;
      padding: 12px 20px;
      background: rgba(255,255,255,0.03);
      border-bottom: 1px solid var(--border);
      gap: 8px;
    }
    .pdf-dot { width: 11px; height: 11px; border-radius: 50%; }
    .pdf-dot-r { background: #ff5f57; }
    .pdf-dot-y { background: #febc2e; }
    .pdf-dot-g { background: #28c840; }
    .pdf-toolbar-title {
      font-family: var(--mono);
      font-size: 0.7rem;
      color: var(--text-3);
      margin-left: auto;
      margin-right: auto;
      letter-spacing: 0.04em;
    }
    .pdf-toolbar-badge {
      font-family: var(--mono);
      font-size: 0.62rem;
      padding: 3px 10px;
      border-radius: 100px;
      background: rgba(0,212,255,0.1);
      color: var(--accent);
      border: 1px solid rgba(0,212,255,0.2);
    }

    /* PDF embed */
    .pdf-embed-wrap {
      position: relative;
      width: 100%;
      background: #1a1a2e;
    }
    .pdf-embed {
      display: block;
      width: 100%;
      height: 85vh;
      min-height: 500px;
      border: none;
    }

    /* Fallback (if browser can't embed PDF) */
    .pdf-fallback {
      display: none;
      padding: 60px 32px;
      text-align: center;
      flex-direction: column;
      align-items: center;
      gap: 16px;
    }
    .pdf-fallback svg { color: var(--text-3); opacity: 0.5; }
    .pdf-fallback p { font-size: 0.9rem; color: var(--text-2); }

    /* ── FOOTER NOTE ── */
    .viewer-footer {
      position: relative; z-index: 1;
      text-align: center;
      padding: 0 24px 32px;
    }
    .viewer-footer p {
      font-family: var(--mono);
      font-size: 0.7rem;
      color: var(--text-3);
    }
    .viewer-footer a {
      color: var(--accent);
      transition: opacity var(--transition);
    }
    .viewer-footer a:hover { opacity: 0.75; }

    /* ── RESPONSIVE ── */
    @media (max-width: 600px) {
      .topbar { padding: 0 16px; }
      .topbar-logo { display: none; }
      .viewer-wrap { padding: 0 12px 40px; }
      .resume-hero { padding: 28px 16px 20px; }
      .pdf-embed { height: 72vh; }
      .btn-print span { display: none; }
    }
  </style>
</head>
<body>

  <div class="bg-grid" aria-hidden="true"></div>
  <div class="bg-glow glow-1" aria-hidden="true"></div>
  <div class="bg-glow glow-2" aria-hidden="true"></div>

  <!-- ── TOP BAR ── -->
  <header class="topbar" role="banner">
    <div class="topbar-inner">
      <a href="../index.html#experience" class="back-btn" id="backToPortfolio" aria-label="Back to portfolio">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
          <path d="M19 12H5M12 19l-7-7 7-7"/>
        </svg>
        Back
      </a>

      <a href="../index.html" class="topbar-logo" id="topbarLogo" aria-label="Portfolio home">
        <span class="logo-bracket">&lt;</span>
        <span class="logo-name">HLT</span>
        <span class="logo-bracket">/&gt;</span>
      </a>

      <div class="topbar-actions">
        <button class="btn-print" id="printBtn" onclick="window.print()" aria-label="Print resume">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
            <polyline points="6 9 6 2 18 2 18 9"/>
            <path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"/>
            <rect x="6" y="14" width="12" height="8"/>
          </svg>
          <span>Print</span>
        </button>
        <a href="HectorVSoftwarePO.pdf.pdf" download="Hector_Luis_Tinagsa_Resume.pdf" class="btn-download" id="downloadResumeBtn" aria-label="Download resume PDF">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
            <polyline points="7 10 12 15 17 10"/>
            <line x1="12" y1="15" x2="12" y2="3"/>
          </svg>
          Download PDF
        </a>
      </div>
    </div>
  </header>

  <!-- ── HERO STRIP ── -->
  <div class="resume-hero" aria-label="Resume header">
    <div class="resume-hero-tag">
      <span class="tag-dot"></span>
      Resume / CV
    </div>
    <h1>Hector Luis <span>A. Tinagsa</span></h1>
    <p class="mono">Full Stack Developer &nbsp;·&nbsp; 5+ Years Experience &nbsp;·&nbsp; Remote</p>
  </div>

  <!-- ── PDF VIEWER ── -->
  <main class="viewer-wrap" id="viewerMain">
    <div class="pdf-card" role="document" aria-label="Resume PDF viewer">
      <!-- Browser toolbar -->
      <div class="pdf-toolbar" aria-hidden="true">
        <div class="pdf-dot pdf-dot-r"></div>
        <div class="pdf-dot pdf-dot-y"></div>
        <div class="pdf-dot pdf-dot-g"></div>
        <span class="pdf-toolbar-title mono">Hector_Luis_Tinagsa_Resume.pdf</span>
        <span class="pdf-toolbar-badge">PDF</span>
      </div>

      <!-- PDF embed -->
      <div class="pdf-embed-wrap">
        <iframe
          id="pdfFrame"
          class="pdf-embed"
          src="HectorVSoftwarePO.pdf.pdf#toolbar=0&navpanes=0&scrollbar=1&view=FitH"
          title="Resume of Hector Luis A. Tinagsa"
          aria-label="Resume PDF document"
          loading="lazy"
        ></iframe>

        <!-- Fallback if PDF can't display -->
        <div class="pdf-fallback" id="pdfFallback">
          <svg width="52" height="52" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" aria-hidden="true">
            <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
            <polyline points="14 2 14 8 20 8"/>
            <line x1="16" y1="13" x2="8" y2="13"/>
            <line x1="16" y1="17" x2="8" y2="17"/>
            <polyline points="10 9 9 9 8 9"/>
          </svg>
          <p>Your browser can't display PDFs inline.</p>
          <a href="HectorVSoftwarePO.pdf.pdf" download="Hector_Luis_Tinagsa_Resume.pdf" class="btn-download" style="margin-top:8px; text-decoration:none;">
            Download PDF Instead
          </a>
        </div>
      </div>
    </div>
  </main>

  <!-- ── FOOTER NOTE ── -->
  <footer class="viewer-footer" role="contentinfo">
    <p>
      &lt;/ <a href="../index.html">Back to Portfolio</a> &nbsp;·&nbsp;
      <a href="mailto:hectortins821@gmail.com">hectortins821@gmail.com</a> &gt;
    </p>
  </footer>

  <script>
    // Detect if PDF failed to load, show fallback
    const frame = document.getElementById('pdfFrame');
    const fallback = document.getElementById('pdfFallback');

    // Mobile: iframes don't display PDFs well on iOS/Android — show fallback
    const isMobile = /Android|iPhone|iPad|iPod/i.test(navigator.userAgent);
    if (isMobile) {
      frame.style.display = 'none';
      fallback.style.display = 'flex';
    }

    // Also catch iframe load errors
    frame.addEventListener('error', () => {
      frame.style.display = 'none';
      fallback.style.display = 'flex';
    });

    // Print: just the iframe content
    window.addEventListener('beforeprint', () => {
      document.body.style.overflow = 'visible';
    });
  </script>
</body>
</html>
